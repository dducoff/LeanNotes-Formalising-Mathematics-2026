name = "LeanNotes-Formalising-Mathematics-2026"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanNotesFormalisingMathematics2026"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "LeanNotesFormalisingMathematics2026"
